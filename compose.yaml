# Run the compiled app under FrankenPHP worker mode locally.
#
#   docker compose up --build           # production-like worker on :8080
#   docker compose --profile dev up      # dev worker with source mounted on :8081
services:
  app:
    build:
      context: .
    image: infrasonic:local
    ports:
      - "8080:8080"
    environment:
      APP_DEBUG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8080/') !== false ? 0 : 1);"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Development worker: your source is mounted in, dependencies and artifacts are
  # (re)built on start, so `docker compose --profile dev up --build` reflects your
  # latest code. Restart the service (or re-run) to pick up changes.
  dev:
    build:
      context: .
    image: infrasonic:local
    profiles: ["dev"]
    ports:
      - "8081:8080"
    environment:
      APP_DEBUG: "true"
    volumes:
      - .:/app
    command:
      - sh
      - -c
      - >-
        composer install --no-interaction --no-progress &&
        php bin/infra build &&
        exec frankenphp run --config /etc/frankenphp/Caddyfile
