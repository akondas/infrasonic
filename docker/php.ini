; Infrasonic production PHP settings (FrankenPHP worker mode).
;
; The application is compiled into the image and served by a long-lived worker,
; so we lean on OPcache + JIT aggressively and never re-validate timestamps.

opcache.enable=1
opcache.enable_cli=1

; Code is baked into the image and never changes at runtime — skip stat() checks.
opcache.validate_timestamps=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000

; JIT: tracing mode with a generous buffer. This is the single biggest lever for
; the compiled kernel's per-request overhead.
opcache.jit=tracing
opcache.jit_buffer_size=64M

; realpath cache — fewer filesystem lookups for the resident worker.
realpath_cache_size=4096k
realpath_cache_ttl=600
